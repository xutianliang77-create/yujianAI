        "400": { $ref: "#/components/responses/ValidationError" }
        "403": { $ref: "#/components/responses/AuthorizationError" }
        "503": { $ref: "#/components/responses/DependencyUnavailable" }
  /platform/v1/support/remote-sessions/{sessionId}/events:
    post:
      tags: [control-plane]
      operationId: appendRemoteAssistanceAuditEvent
      security: [{ remoteSessionBearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/RemoteSessionId" }]
