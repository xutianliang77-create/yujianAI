openapi: 3.1.0
info:
  title: 语见AI Platform API
  version: 0.1.0
  description: 控制面 v1；媒体协议、Room、Participant、Track、Data 和 RPC 保持 LiveKit 官方兼容。
servers:
  - url: http://{host}:{port}
    variables:
      host: { default: 127.0.0.1 }
      port: { default: "8090" }
tags:
  - name: health
  - name: control-plane
  - name: rtc
  - name: media
paths:
  /healthz:
    get:
      tags: [health]
      operationId: getHealth
      responses:
        "200":
          description: process is alive
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Health" }
  /readyz:
    get:
      tags: [health]
      operationId: getReadiness
      responses:
        "200": { description: all configured RTC nodes are ready }
        "503": { description: one or more RTC nodes are unavailable }
  /metrics:
    get:
      tags: [health]
      operationId: getMetrics
      responses:
        "200":
          description: Prometheus text exposition
          content:
            text/plain:
              schema: { type: string }

  /platform/v1/admin/outbox/{eventId}:requeue:
    post:
      tags: [control-plane]
      operationId: requeueOutboxDeadLetter
      security: [{ adminBearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/OutboxEventId" }]
      responses:
        "200":
          description: dead-letter event requeued
          content:
            application/json:
              schema:
                type: object
                required: [apiVersion, requestId, data]
                properties:
                  apiVersion: { type: string }
                  requestId: { type: string }
                  data:
                    type: object
                    required: [eventId, status]
                    properties:
                      eventId: { type: string }
                      status: { const: requeued }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/AuthenticationError" }
        "403": { $ref: "#/components/responses/AuthorizationError" }
        "503": { $ref: "#/components/responses/DependencyUnavailable" }

  /platform/v1/environments/{environmentId}/webhooks:
    get:
      tags: [control-plane]
      operationId: listWebhookDestinations
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/EnvironmentId" }]
      responses:
        "200": { $ref: "#/components/responses/WebhookDestinationList" }
        "401": { $ref: "#/components/responses/AuthenticationError" }
        "403": { $ref: "#/components/responses/AuthorizationError" }
        "503": { $ref: "#/components/responses/DependencyUnavailable" }
  /platform/v1/environments/{environmentId}/webhooks/{destinationId}:
    get:
      tags: [control-plane]
      operationId: getWebhookDestination
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/EnvironmentId" }
        - { $ref: "#/components/parameters/WebhookDestinationId" }
      responses:
        "200": { $ref: "#/components/responses/WebhookDestination" }
        "401": { $ref: "#/components/responses/AuthenticationError" }
        "403": { $ref: "#/components/responses/AuthorizationError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
        "503": { $ref: "#/components/responses/DependencyUnavailable" }
    put:
      tags: [control-plane]
      operationId: upsertWebhookDestination
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/EnvironmentId" }
        - { $ref: "#/components/parameters/WebhookDestinationId" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpsertWebhookDestinationRequest" }
      responses:
        "200": { $ref: "#/components/responses/WebhookDestination" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/AuthenticationError" }
        "403": { $ref: "#/components/responses/AuthorizationError" }
        "503": { $ref: "#/components/responses/DependencyUnavailable" }
    delete:
      tags: [control-plane]
      operationId: disableWebhookDestination
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/EnvironmentId" }
        - { $ref: "#/components/parameters/WebhookDestinationId" }
      responses:
        "204": { description: destination disabled }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/AuthenticationError" }
        "403": { $ref: "#/components/responses/AuthorizationError" }
        "503": { $ref: "#/components/responses/DependencyUnavailable" }

  /platform/v1/tenants:
    post:
      tags: [control-plane]
      operationId: createTenant
      security: [{ adminBearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateTenantRequest" }
      responses:
        "201": { $ref: "#/components/responses/TenantCreated" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/AuthenticationError" }
        "409": { $ref: "#/components/responses/ConflictError" }
  /platform/v1/tenants/{tenantId}:
    get:
      tags: [control-plane]
      operationId: getTenant
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/TenantId" }]
      responses:
        "200": { $ref: "#/components/responses/Tenant" }
        "401": { $ref: "#/components/responses/AuthenticationError" }
        "403": { $ref: "#/components/responses/AuthorizationError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
  /platform/v1/tenants/{tenantId}/projects:
    post:
      tags: [control-plane]
      operationId: createProject
      security: [{ adminBearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/TenantId" }
        - { $ref: "#/components/parameters/IdempotencyKey" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateProjectRequest" }
      responses:
        "201": { $ref: "#/components/responses/ProjectCreated" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/AuthenticationError" }
        "403": { $ref: "#/components/responses/AuthorizationError" }
  /platform/v1/projects/{projectId}/environments:
    post:
      tags: [control-plane]
      operationId: createEnvironment
      security: [{ adminBearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ProjectId" }
        - { $ref: "#/components/parameters/IdempotencyKey" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateEnvironmentRequest" }
      responses:
        "201": { $ref: "#/components/responses/EnvironmentCreated" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/AuthenticationError" }
        "403": { $ref: "#/components/responses/AuthorizationError" }
  /platform/v1/projects/{projectId}:
    get:
      tags: [control-plane]
      operationId: getProject
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/ProjectId" }]
      responses:
        "200": { $ref: "#/components/responses/Project" }
        "401": { $ref: "#/components/responses/AuthenticationError" }
        "403": { $ref: "#/components/responses/AuthorizationError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
  /platform/v1/environments/{environmentId}:
    get:
      tags: [control-plane]
      operationId: getEnvironment
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/EnvironmentId" }]
      responses:
        "200": { $ref: "#/components/responses/Environment" }
        "401": { $ref: "#/components/responses/AuthenticationError" }
        "403": { $ref: "#/components/responses/AuthorizationError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
    patch:
      tags: [control-plane]
      operationId: updateEnvironment
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/EnvironmentId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateEnvironmentRequest" }
      responses:
        "200": { $ref: "#/components/responses/Environment" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/AuthenticationError" }
        "403": { $ref: "#/components/responses/AuthorizationError" }
        "409": { $ref: "#/components/responses/ConflictError" }
  /platform/v1/environments/{environmentId}/api-keys:
    get:
      tags: [control-plane]
      operationId: listApiKeys
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/EnvironmentId" }]
      responses:
        "200": { $ref: "#/components/responses/ApiKeyList" }
        "401": { $ref: "#/components/responses/AuthenticationError" }
        "403": { $ref: "#/components/responses/AuthorizationError" }
    post:
      tags: [control-plane]
      operationId: createApiKey
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/EnvironmentId" }
        - { $ref: "#/components/parameters/IdempotencyKey" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateApiKeyRequest" }
      responses:
        "201": { $ref: "#/components/responses/ApiKeyCreated" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/AuthenticationError" }
        "403": { $ref: "#/components/responses/AuthorizationError" }
  /platform/v1/api-keys/{apiKeyId}:
    get:
      tags: [control-plane]
      operationId: getApiKey
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/ApiKeyId" }]
      responses:
        "200": { $ref: "#/components/responses/ApiKeyMetadata" }
        "401": { $ref: "#/components/responses/AuthenticationError" }
        "403": { $ref: "#/components/responses/AuthorizationError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
  /platform/v1/api-keys/{apiKeyId}:rotate:
    post:
      tags: [control-plane]
      operationId: rotateApiKey
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ApiKeyId" }
        - { $ref: "#/components/parameters/IdempotencyKey" }
      responses:
        "200": { $ref: "#/components/responses/ApiKeyCreated" }
        "401": { $ref: "#/components/responses/AuthenticationError" }
        "403": { $ref: "#/components/responses/AuthorizationError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
  /platform/v1/api-keys/{apiKeyId}:revoke:
    post:
      tags: [control-plane]
      operationId: revokeApiKey
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ApiKeyId" }
        - { $ref: "#/components/parameters/IdempotencyKey" }
      responses:
        "200": { $ref: "#/components/responses/ApiKeyMetadata" }
        "401": { $ref: "#/components/responses/AuthenticationError" }
        "403": { $ref: "#/components/responses/AuthorizationError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
  /platform/v1/tenants/{tenantId}/members:
    get:
      tags: [control-plane]
      operationId: listMembers
      security: [{ adminBearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/TenantId" }]
      responses:
        "200": { $ref: "#/components/responses/MemberList" }
        "401": { $ref: "#/components/responses/AuthenticationError" }
    post:
      tags: [control-plane]
      operationId: createMember
      security: [{ adminBearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/TenantId" }
        - { $ref: "#/components/parameters/IdempotencyKey" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateMemberRequest" }
      responses:
        "201": { $ref: "#/components/responses/MemberCreated" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/AuthenticationError" }
        "409": { $ref: "#/components/responses/ConflictError" }
  /platform/v1/tenant-members/{memberId}:
    patch:
      tags: [control-plane]
      operationId: updateMember
      security: [{ adminBearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/MemberId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateMemberRequest" }
      responses:
        "200": { $ref: "#/components/responses/Member" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/AuthenticationError" }
        "404": { $ref: "#/components/responses/NotFoundError" }

  /platform/v1/environments/{environmentId}/quotas:
    get:
      tags: [control-plane]
      operationId: getQuotaSnapshot
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/EnvironmentId" }]
      responses:
        "200": { $ref: "#/components/responses/QuotaSnapshot" }
        "401": { $ref: "#/components/responses/AuthenticationError" }
        "403": { $ref: "#/components/responses/AuthorizationError" }
  /platform/v1/environments/{environmentId}/usage:
    get:
      tags: [control-plane]
      operationId: listUsage
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/EnvironmentId" }]
      responses:
        "200": { $ref: "#/components/responses/UsageList" }
  /platform/v1/environments/{environmentId}/audit:
    get:
      tags: [control-plane]
      operationId: listAudit
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/EnvironmentId" }]
      responses:
        "200": { $ref: "#/components/responses/AuditList" }
  /platform/v1/environments/{environmentId}/endpoints:
    get:
      tags: [rtc]
      operationId: listRtcEndpoints
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/EnvironmentId" }]
      responses:
        "200": { $ref: "#/components/responses/EndpointList" }

  /platform/v1/rtc/token:
    post:
      tags: [rtc]
      operationId: issueRoomToken
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/IssueRoomTokenRequest" }
      responses:
        "201": { $ref: "#/components/responses/IssuedToken" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/AuthenticationError" }
        "403": { $ref: "#/components/responses/AuthorizationError" }
        "429": { $ref: "#/components/responses/QuotaError" }
  /platform/v1/environments/{environmentId}/rooms:
    get:
      tags: [rtc]
      operationId: listRooms
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/EnvironmentId" }
        - { $ref: "#/components/parameters/NodeIdQuery" }
      responses:
        "200": { $ref: "#/components/responses/RoomList" }
        "401": { $ref: "#/components/responses/AuthenticationError" }
        "403": { $ref: "#/components/responses/AuthorizationError" }
  /platform/v1/environments/{environmentId}/rooms/{roomName}/participants:
    get:
      tags: [rtc]
      operationId: listParticipants
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/EnvironmentId" }
        - { $ref: "#/components/parameters/RoomName" }
        - { $ref: "#/components/parameters/NodeIdQuery" }
      responses:
        "200": { $ref: "#/components/responses/ParticipantList" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "403": { $ref: "#/components/responses/AuthorizationError" }
  /platform/v1/environments/{environmentId}/rooms/{roomName}/participants/{identity}:
    get:
      tags: [rtc]
      operationId: getParticipant
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/EnvironmentId" }
        - { $ref: "#/components/parameters/RoomName" }
        - { $ref: "#/components/parameters/ParticipantIdentity" }
        - { $ref: "#/components/parameters/NodeIdQuery" }
      responses:
        "200": { $ref: "#/components/responses/Participant" }
        "404": { $ref: "#/components/responses/NotFoundError" }
    delete:
      tags: [rtc]
      operationId: removeParticipant
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/EnvironmentId" }
        - { $ref: "#/components/parameters/RoomName" }
        - { $ref: "#/components/parameters/ParticipantIdentity" }
        - { $ref: "#/components/parameters/NodeIdQuery" }
      responses:
        "204": { description: participant removed }
        "403": { $ref: "#/components/responses/AuthorizationError" }
    patch:
      tags: [rtc]
      operationId: updateParticipant
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/EnvironmentId" }
        - { $ref: "#/components/parameters/RoomName" }
        - { $ref: "#/components/parameters/ParticipantIdentity" }
        - { $ref: "#/components/parameters/NodeIdQuery" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ParticipantPatch" }
      responses:
        "200": { $ref: "#/components/responses/Participant" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "403": { $ref: "#/components/responses/AuthorizationError" }
  /platform/v1/environments/{environmentId}/telemetry/rtc:
    get:
      tags: [rtc]
      operationId: getRtcTelemetry
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/EnvironmentId" }]
      responses:
        "200": { $ref: "#/components/responses/RtcTelemetry" }
    post:
      tags: [rtc]
      operationId: recordRtcTelemetry
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/EnvironmentId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RtcQualitySample" }
      responses:
        "202": { $ref: "#/components/responses/RtcQualitySample" }
        "400": { $ref: "#/components/responses/ValidationError" }

  /platform/v1/environments/{environmentId}/media/ingress:
    get:
      tags: [media]
      operationId: listIngress
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/EnvironmentId" }]
      responses:
        "200": { $ref: "#/components/responses/IngressList" }
        "401": { $ref: "#/components/responses/AuthenticationError" }
        "403": { $ref: "#/components/responses/AuthorizationError" }
    post:
      tags: [media]
      operationId: createIngress
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/EnvironmentId" }
        - { $ref: "#/components/parameters/IdempotencyKey" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateIngressRequest" }
      responses:
        "201": { $ref: "#/components/responses/Ingress" }
        "403": { $ref: "#/components/responses/AuthorizationError" }
        "409": { $ref: "#/components/responses/ConflictError" }
        "429": { $ref: "#/components/responses/QuotaError" }
  /platform/v1/environments/{environmentId}/media/ingress/{ingressId}:
    get:
      tags: [media]
      operationId: getIngress
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/EnvironmentId" }
        - { $ref: "#/components/parameters/IngressId" }
      responses:
        "200": { $ref: "#/components/responses/Ingress" }
        "403": { $ref: "#/components/responses/AuthorizationError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
  /platform/v1/environments/{environmentId}/media/egress:
    get:
      tags: [media]
      operationId: listEgress
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/EnvironmentId" }]
      responses:
        "200": { $ref: "#/components/responses/EgressList" }
        "401": { $ref: "#/components/responses/AuthenticationError" }
        "403": { $ref: "#/components/responses/AuthorizationError" }
    post:
      tags: [media]
      operationId: createEgress
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/EnvironmentId" }
        - { $ref: "#/components/parameters/IdempotencyKey" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateEgressRequest" }
      responses:
        "201": { $ref: "#/components/responses/Egress" }
        "403": { $ref: "#/components/responses/AuthorizationError" }
        "409": { $ref: "#/components/responses/ConflictError" }
        "429": { $ref: "#/components/responses/QuotaError" }
  /platform/v1/environments/{environmentId}/media/egress/{egressId}:
    get:
      tags: [media]
      operationId: getEgress
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/EnvironmentId" }
        - { $ref: "#/components/parameters/EgressId" }
      responses:
        "200": { $ref: "#/components/responses/Egress" }
        "403": { $ref: "#/components/responses/AuthorizationError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
  /platform/v1/environments/{environmentId}/media/sip/calls:
    get:
      tags: [media]
      operationId: listSipCalls
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/EnvironmentId" }]
      responses:
        "200": { $ref: "#/components/responses/SipCallList" }
        "401": { $ref: "#/components/responses/AuthenticationError" }
        "403": { $ref: "#/components/responses/AuthorizationError" }
    post:
      tags: [media]
      operationId: requestSipCall
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/EnvironmentId" }
        - { $ref: "#/components/parameters/IdempotencyKey" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateSipCallRequest" }
      responses:
        "201": { $ref: "#/components/responses/SipCall" }
        "403": { $ref: "#/components/responses/AuthorizationError" }
        "409": { $ref: "#/components/responses/ConflictError" }
        "429": { $ref: "#/components/responses/QuotaError" }
  /platform/v1/environments/{environmentId}/media/sip/calls/{callId}:
    get:
      tags: [media]
      operationId: getSipCall
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/EnvironmentId" }
        - { $ref: "#/components/parameters/CallId" }
      responses:
        "200": { $ref: "#/components/responses/SipCall" }
        "403": { $ref: "#/components/responses/AuthorizationError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
  /platform/v1/environments/{environmentId}/media/sip/calls/{callId}:transfer:
    post:
      tags: [media]
      operationId: transferSipCall
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/EnvironmentId" }
        - { $ref: "#/components/parameters/CallId" }
        - { $ref: "#/components/parameters/IdempotencyKey" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TransferSipCallRequest" }
      responses:
        "200": { $ref: "#/components/responses/SipCall" }
        "403": { $ref: "#/components/responses/AuthorizationError" }
        "409": { $ref: "#/components/responses/ConflictError" }
  /platform/v1/environments/{environmentId}/media/sip/calls/{callId}:hangup:
    post:
      tags: [media]
      operationId: hangupSipCall
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/EnvironmentId" }
        - { $ref: "#/components/parameters/CallId" }
        - { $ref: "#/components/parameters/IdempotencyKey" }
