components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: yujian-environment-key }
    adminBearerAuth: { type: http, scheme: bearer, bearerFormat: yujian-admin-key }
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string, minLength: 1, maxLength: 128 }
    TenantId: { name: tenantId, in: path, required: true, schema: { $ref: "#/components/schemas/ResourceId" } }
    ProjectId: { name: projectId, in: path, required: true, schema: { $ref: "#/components/schemas/ResourceId" } }
    EnvironmentId: { name: environmentId, in: path, required: true, schema: { $ref: "#/components/schemas/ResourceId" } }
    ApiKeyId: { name: apiKeyId, in: path, required: true, schema: { type: string, minLength: 1, maxLength: 128 } }
    IngressId: { name: ingressId, in: path, required: true, schema: { type: string, minLength: 1, maxLength: 128 } }
    EgressId: { name: egressId, in: path, required: true, schema: { type: string, minLength: 1, maxLength: 128 } }
    CallId: { name: callId, in: path, required: true, schema: { type: string, minLength: 1, maxLength: 128 } }
    MemberId: { name: memberId, in: path, required: true, schema: { type: string, minLength: 1, maxLength: 128 } }
    InvoiceId: { name: invoiceId, in: path, required: true, schema: { type: string, minLength: 1, maxLength: 128 } }
    DataRightsRequestId: { name: requestId, in: path, required: true, schema: { type: string, minLength: 1, maxLength: 128 } }
    OutboxEventId: { name: eventId, in: path, required: true, schema: { type: string, pattern: '^[A-Za-z0-9._:-]{1,256}$' } }
    WebhookDestinationId: { name: destinationId, in: path, required: true, schema: { type: string, pattern: '^[A-Za-z0-9._:-]{1,128}$' } }
    RoomName: { name: roomName, in: path, required: true, schema: { type: string, minLength: 1, maxLength: 128 } }
    ParticipantIdentity: { name: identity, in: path, required: true, schema: { type: string, minLength: 1, maxLength: 128 } }
    NodeIdQuery: { name: nodeId, in: query, required: false, schema: { type: string, minLength: 2, maxLength: 32 } }
  responses:
    Tenant:
      description: tenant
      content: { application/json: { schema: { $ref: "#/components/schemas/TenantEnvelope" } } }
    Project:
      description: project
      content: { application/json: { schema: { $ref: "#/components/schemas/ProjectEnvelope" } } }
    Environment:
      description: environment
      content: { application/json: { schema: { $ref: "#/components/schemas/EnvironmentEnvelope" } } }
    TenantCreated:
      description: tenant created
      content: { application/json: { schema: { $ref: "#/components/schemas/TenantEnvelope" } } }
    ProjectCreated:
      description: project created
      content: { application/json: { schema: { $ref: "#/components/schemas/ProjectEnvelope" } } }
    EnvironmentCreated:
      description: environment created
      content: { application/json: { schema: { $ref: "#/components/schemas/EnvironmentEnvelope" } } }
    ApiKeyCreated:
      description: API key metadata and one-time secret
      content: { application/json: { schema: { $ref: "#/components/schemas/IssuedApiKeyEnvelope" } } }
    ApiKeyMetadata:
      description: API key metadata
      content: { application/json: { schema: { $ref: "#/components/schemas/ApiKeyMetadataEnvelope" } } }
    ApiKeyList:
      description: environment-scoped API key metadata
      content: { application/json: { schema: { $ref: "#/components/schemas/ApiKeyListEnvelope" } } }
    Member:
      description: member
      content: { application/json: { schema: { $ref: "#/components/schemas/MemberEnvelope" } } }
    MemberCreated:
      description: member created
      content: { application/json: { schema: { $ref: "#/components/schemas/MemberEnvelope" } } }
    MemberList:
      description: member list
      content: { application/json: { schema: { $ref: "#/components/schemas/MemberListEnvelope" } } }
    QuotaSnapshot:
      description: quota snapshot
      content: { application/json: { schema: { $ref: "#/components/schemas/QuotaEnvelope" } } }
    UsageList:
      description: immutable usage records
      content: { application/json: { schema: { $ref: "#/components/schemas/UsageListEnvelope" } } }
    AuditList:
      description: scoped audit records
      content: { application/json: { schema: { $ref: "#/components/schemas/AuditListEnvelope" } } }
    EndpointList:
      description: RTC endpoint discovery without secrets
      content: { application/json: { schema: { $ref: "#/components/schemas/EndpointListEnvelope" } } }
    IssuedToken:
      description: short-lived Room token
      content: { application/json: { schema: { $ref: "#/components/schemas/TokenEnvelope" } } }
    RoomList:
      description: Room list
      content: { application/json: { schema: { $ref: "#/components/schemas/RoomListEnvelope" } } }
    ParticipantList:
      description: participant list
      content: { application/json: { schema: { $ref: "#/components/schemas/ParticipantListEnvelope" } } }
    Participant:
      description: participant information
      content: { application/json: { schema: { $ref: "#/components/schemas/ParticipantEnvelope" } } }
    RtcTelemetry:
      description: RTC quality summary
      content: { application/json: { schema: { $ref: "#/components/schemas/TelemetryEnvelope" } } }
    RtcQualitySample:
      description: accepted RTC quality sample
      content: { application/json: { schema: { $ref: "#/components/schemas/TelemetrySampleEnvelope" } } }
    Ingress:
      description: ingress job
      content: { application/json: { schema: { $ref: "#/components/schemas/IngressEnvelope" } } }
    IngressList:
      description: ingress jobs
      content: { application/json: { schema: { $ref: "#/components/schemas/IngressListEnvelope" } } }
    Egress:
      description: egress job
      content: { application/json: { schema: { $ref: "#/components/schemas/EgressEnvelope" } } }
    EgressList:
      description: egress jobs
      content: { application/json: { schema: { $ref: "#/components/schemas/EgressListEnvelope" } } }
    SipCall:
      description: SIP call request
      content: { application/json: { schema: { $ref: "#/components/schemas/SipCallEnvelope" } } }
    SipCallList:
      description: SIP calls
      content: { application/json: { schema: { $ref: "#/components/schemas/SipCallListEnvelope" } } }
    ValidationError: { description: invalid request contract, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    AuthenticationError: { description: authentication failed, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    AuthorizationError: { description: authorization failed, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    ConflictError: { description: resource conflict, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    NotFoundError: { description: resource not found, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    QuotaError: { description: quota exceeded, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    UpstreamUnavailableError: { description: backing service unavailable, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    DependencyUnavailable: { description: required deployment dependency is unavailable, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    BillingStatementList:
      description: tenant billing statements
      content: { application/json: { schema: { $ref: "#/components/schemas/BillingStatementListEnvelope" } } }
    Invoice:
      description: invoice
      content: { application/json: { schema: { $ref: "#/components/schemas/InvoiceEnvelope" } } }
    AdjustmentList:
      description: invoice adjustments
      content: { application/json: { schema: { $ref: "#/components/schemas/AdjustmentListEnvelope" } } }
    DataRightsList:
      description: data subject requests
      content: { application/json: { schema: { $ref: "#/components/schemas/DataRightsListEnvelope" } } }
    DataRightsRequest:
      description: data subject request
      content: { application/json: { schema: { $ref: "#/components/schemas/DataRightsRequestEnvelope" } } }
    WebhookDestination:
      description: webhook destination without secret material
      content: { application/json: { schema: { $ref: "#/components/schemas/WebhookDestinationEnvelope" } } }
    WebhookDestinationList:
      description: environment webhook destinations without secret material
      content: { application/json: { schema: { $ref: "#/components/schemas/WebhookDestinationListEnvelope" } } }
  schemas:
    ResourceId: { type: string, pattern: "^[a-z][a-z0-9-]{2,63}$" }
    Health:
      type: object
      required: [status, service, version]
      properties:
        status: { type: string, const: ok }
        service: { type: string }
        version: { type: string }
    Scope:
      type: object
      required: [tenantId, projectId, environmentId]
      properties:
        tenantId: { $ref: "#/components/schemas/ResourceId" }
        projectId: { $ref: "#/components/schemas/ResourceId" }
        environmentId: { $ref: "#/components/schemas/ResourceId" }
    CreateTenantRequest:
      type: object
      required: [displayName]
      additionalProperties: false
      properties:
        displayName: { type: string, minLength: 1, maxLength: 128 }
        dataResidencyPolicy: { type: string, maxLength: 64 }
        planId: { type: string, maxLength: 64 }
    CreateProjectRequest:
      type: object
      required: [tenantId, name, slug]
      additionalProperties: false
      properties:
        tenantId: { $ref: "#/components/schemas/ResourceId" }
        name: { type: string, minLength: 1, maxLength: 128 }
        slug: { type: string, pattern: "^[a-z][a-z0-9-]{2,63}$" }
        defaultRegionPolicyId: { type: string, maxLength: 64 }
    CreateEnvironmentRequest:
      type: object
      required: [tenantId, projectId, name, type, endpoint]
      additionalProperties: false
      properties:
        tenantId: { $ref: "#/components/schemas/ResourceId" }
        projectId: { $ref: "#/components/schemas/ResourceId" }
        name: { type: string, minLength: 1, maxLength: 128 }
        type: { type: string, enum: [dev, test, staging, prod] }
        endpoint: { type: string, minLength: 1, maxLength: 128 }
        regionPolicyId: { type: string, maxLength: 64 }
        quotaPolicyId: { type: string, maxLength: 64 }
        retentionPolicyId: { type: string, maxLength: 64 }
    UpdateEnvironmentRequest:
      type: object
      required: [version]
      minProperties: 2
      additionalProperties: false
      properties:
        version: { type: integer, minimum: 1 }
        name: { type: string, minLength: 1, maxLength: 128 }
        endpoint: { type: string, minLength: 1, maxLength: 128 }
        status: { type: string, enum: [active, suspended, retiring, retired] }
        regionPolicyId: { type: string, maxLength: 64 }
        quotaPolicyId: { type: string, maxLength: 64 }
        retentionPolicyId: { type: string, maxLength: 64 }
    CreateApiKeyRequest:
      type: object
      required: [scopes]
      additionalProperties: false
      properties:
        scopes: { type: array, minItems: 1, maxItems: 32, items: { type: string, maxLength: 128 } }
        expiresAt: { type: string, format: date-time }
    CreateMemberRequest:
      type: object
      required: [subject, roles]
      additionalProperties: false
      properties:
        subject: { type: string, minLength: 1, maxLength: 128 }
        roles: { type: array, minItems: 1, maxItems: 32, items: { type: string } }
    UpdateMemberRequest:
      type: object
      minProperties: 1
      additionalProperties: false
      properties:
        roles: { type: array, minItems: 1, maxItems: 32, items: { type: string } }
        status: { type: string, enum: [active, suspended, removed] }
    IssueRoomTokenRequest:
      type: object
      required: [tenantId, projectId, environmentId, roomName, participantIdentity, permissions, ttlSeconds]
      additionalProperties: false
      properties:
        tenantId: { $ref: "#/components/schemas/ResourceId" }
        projectId: { $ref: "#/components/schemas/ResourceId" }
        environmentId: { $ref: "#/components/schemas/ResourceId" }
        roomName: { type: string, minLength: 1, maxLength: 128 }
        participantIdentity: { type: string, minLength: 1, maxLength: 128 }
        participantName: { type: string, maxLength: 128 }
        metadata: { type: string, maxLength: 4096 }
        attributes: { type: object, maxProperties: 32, additionalProperties: { type: string, maxLength: 256 } }
        permissions:
          type: object
          required: [canPublish, canSubscribe, canPublishData]
          additionalProperties: false
          properties:
            canPublish: { type: boolean }
            canSubscribe: { type: boolean }
            canPublishData: { type: boolean }
        ttlSeconds: { type: integer, minimum: 60, maximum: 300 }
    ParticipantPatch:
      type: object
      additionalProperties: false
      properties:
        metadata: { type: string, maxLength: 4096 }
        name: { type: string, maxLength: 128 }
        attributes: { type: object, maxProperties: 32, additionalProperties: { type: string, maxLength: 256 } }
    CreateIngressRequest:
      type: object
      required: [roomName, inputType]
      additionalProperties: false
      properties:
        roomName: { type: string, minLength: 1, maxLength: 128 }
        inputType: { type: string, enum: [rtmp, whip, url] }
        url: { type: string, format: uri, minLength: 1, maxLength: 2048 }
    CreateEgressRequest:
      type: object
      required: [roomName, outputType]
      additionalProperties: false
      properties:
        roomName: { type: string, minLength: 1, maxLength: 128 }
        outputType: { type: string, enum: [mp4, hls, rtmp] }
        outputTarget: { type: string, minLength: 1, maxLength: 2048 }
    CreateSipCallRequest:
      type: object
      required: [roomName, direction, remoteNumber]
      additionalProperties: false
      properties:
        roomName: { type: string, minLength: 1, maxLength: 128 }
        sipTrunkId: { type: string, minLength: 1, maxLength: 128 }
        participantIdentity: { type: string, minLength: 1, maxLength: 128 }
        dtmf: { type: string, pattern: "^[0-9*#w]{1,64}$" }
        direction: { type: string, enum: [inbound, outbound] }
        remoteNumber: { type: string, minLength: 1, maxLength: 128 }
    TransferSipCallRequest:
      type: object
      required: [transferTo]
      additionalProperties: false
      properties:
        transferTo: { type: string, minLength: 1, maxLength: 256 }
    DataRightsSubmitRequest:
      type: object
      required: [subjectId, kind]
      additionalProperties: false
      properties:
        subjectId: { type: string, minLength: 1, maxLength: 256 }
        kind: { type: string, enum: [export, delete, rectify] }
    DataRightsEvidenceRequest:
      type: object
      additionalProperties: false
      properties:
        evidenceUri: { type: string, minLength: 1, maxLength: 256 }
    RtcQualitySample:
      type: object
      required: [nodeId, roomName, participantIdentity, capturedAt]
      additionalProperties: false
      properties:
        nodeId: { type: string, minLength: 1, maxLength: 64 }
        roomName: { type: string, minLength: 1, maxLength: 128 }
        participantIdentity: { type: string, minLength: 1, maxLength: 128 }
        capturedAt: { type: string, format: date-time }
        rttMs: { type: number, minimum: 0 }
        jitterMs: { type: number, minimum: 0 }
        packetsLost: { type: number, minimum: 0 }
        packetsSent: { type: number, minimum: 0 }
        bitrateKbps: { type: number, minimum: 0 }
        audioLevel: { type: number, minimum: 0 }
    Tenant: { type: object, additionalProperties: true, required: [tenantId, status] }
    Project: { type: object, additionalProperties: true, required: [projectId, tenantId, status] }
    Environment: { type: object, additionalProperties: true, required: [environmentId, tenantId, projectId, status] }
    Member: { type: object, additionalProperties: true, required: [memberId, tenantId, subject, roles, status] }
    ApiKeyMetadata: { type: object, additionalProperties: true, required: [apiKeyId, tenantId, projectId, environmentId, status] }
    IssuedApiKey: { type: object, required: [metadata, secret], properties: { metadata: { $ref: "#/components/schemas/ApiKeyMetadata" }, secret: { type: string } } }
    QuotaSnapshot: { type: object, additionalProperties: true, required: [environmentId, policy, observedAt] }
    UsageRecord: { type: object, additionalProperties: true, required: [usageRecordId, tenantId, projectId, environmentId, metric, quantity] }
    AuditEvent: { type: object, additionalProperties: true, required: [auditEventId, action, occurredAt, result] }
    Endpoint: { type: object, additionalProperties: true, required: [id, url, protocol] }
    Token: { type: object, required: [token, url, expiresAt, nodeId], properties: { token: { type: string }, url: { type: string }, expiresAt: { type: string, format: date-time }, nodeId: { type: string }, routingReason: { type: string } } }
    Room: { type: object, additionalProperties: true }
    Participant: { type: object, additionalProperties: true }
    TelemetrySummary:
      type: object
      additionalProperties: false
      required: [environmentId, windowStart, windowEnd, sampleCount, packetLossRate]
      properties:
        environmentId: { $ref: "#/components/schemas/ResourceId" }
        windowStart: { type: string, format: date-time }
        windowEnd: { type: string, format: date-time }
        sampleCount: { type: integer, minimum: 0 }
        packetLossRate: { type: number, minimum: 0, maximum: 1 }
        p50RttMs: { type: number, minimum: 0 }
        p95RttMs: { type: number, minimum: 0 }
        p99RttMs: { type: number, minimum: 0 }
        p50JitterMs: { type: number, minimum: 0 }
        p95JitterMs: { type: number, minimum: 0 }
        p99JitterMs: { type: number, minimum: 0 }
        averageBitrateKbps: { type: number, minimum: 0 }
    IngressJob:
      type: object
      additionalProperties: false
      required: [ingressId, environmentId, roomName, inputType, status, idempotencyKey, createdAt, updatedAt]
      properties:
        ingressId: { type: string }
        environmentId: { $ref: "#/components/schemas/ResourceId" }
        roomName: { type: string, maxLength: 128 }
        inputType: { type: string, enum: [rtmp, whip, url] }
        status: { type: string, enum: [requested, starting, active, draining, completed, failed, cancelled] }
        providerIngressId: { type: string, maxLength: 256 }
        idempotencyKey: { type: string, maxLength: 128 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    EgressJob:
      type: object
      additionalProperties: false
      required: [egressId, environmentId, roomName, outputType, status, idempotencyKey, createdAt, updatedAt]
      properties:
        egressId: { type: string }
        environmentId: { $ref: "#/components/schemas/ResourceId" }
        roomName: { type: string, maxLength: 128 }
        outputType: { type: string, enum: [mp4, hls, rtmp] }
        status: { type: string, enum: [requested, starting, active, draining, completed, failed, cancelled] }
        providerEgressId: { type: string, maxLength: 256 }
        objectUri: { type: string, maxLength: 2048 }
        retentionExpiresAt: { type: string, format: date-time }
        deletedAt: { type: string, format: date-time }
        deletionEvidenceUri: { type: string, maxLength: 2048 }
        idempotencyKey: { type: string, maxLength: 128 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    SipCall:
      type: object
      additionalProperties: true
      required: [callId, environmentId, status]
      properties:
        callId: { type: string }
        environmentId: { $ref: "#/components/schemas/ResourceId" }
        sipTrunkId: { type: string, maxLength: 128 }
        participantIdentity: { type: string, maxLength: 128 }
        status: { type: string, enum: [requested, starting, active, draining, completed, failed, cancelled] }
    Invoice: { type: object, additionalProperties: true, required: [invoiceId, tenantId, billingPeriod, currency, status, totalFen] }
    BillingAdjustment: { type: object, additionalProperties: true, required: [adjustmentId, invoiceId, kind, amountFen, dedupeKey] }
    DataRightsRequest: { type: object, additionalProperties: true, required: [requestId, tenantId, subjectId, kind, status, createdAt] }
    WebhookDestination:
      type: object
      additionalProperties: false
      required: [destinationId, tenantId, projectId, environmentId, url, secretRef, eventTypes, status, createdAt, updatedAt]
      properties:
