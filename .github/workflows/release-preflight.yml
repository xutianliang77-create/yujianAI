name: Release evidence preflight

on:
  workflow_dispatch:
    inputs:
      evidence:
        description: "Comma-separated release evidence keys from the signed review record"
        required: true
        type: string

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Verify OpenAPI contract
        run: npm run openapi:verify
      - name: Generate SBOM
        run: npm run supply-chain:sbom
      - name: Check release evidence manifest
        env:
          YUJIAN_RELEASE_EVIDENCE: ${{ inputs.evidence }}
        run: node tools/release/preflight.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: yujian-release-sbom
          path: outputs/sbom/yujian-package-lock.spdx.json
