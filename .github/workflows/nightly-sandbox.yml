name: Nightly developer sandbox metadata

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Publish sandbox contract metadata
        run: |
          test -f docs/compatibility/MATRIX.md
          test -f infra/upstream/livekit-versions.json
          test -f docs/api/openapi.yaml
          npm run openapi:verify
          echo "Sandbox deployment is intentionally externalized; no test or public endpoint is started here."
