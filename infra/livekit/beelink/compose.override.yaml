services:
  redis:
    image: redis:7.2.7-alpine@sha256:1de7ca6a3f63a083036fa1d95dddbd6bdfcdf5865bb692c1e412d4bdf9cb1e37
    platform: linux/amd64

  yujian-rtc-a:
    image: livekit/livekit-server:v1.13.3@sha256:8ef3ee244ded8477d5b40d9dff4b084e1809a9fa0e4d9ed8d29943b3c6322998
    platform: linux/amd64
    environment:
      YUJIAN_RTC_NODE_ID: yujian-rtc-a
      LIVEKIT_CONFIG: |
        port: 7880
        rtc:
          tcp_port: 7881
          udp_port: 7882
          node_ip: ${YUJIAN_RTC_NODE_IP:?set YUJIAN_RTC_NODE_IP}
        redis:
          address: redis:6379
        keys:
          ${LIVEKIT_API_KEY:?set LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET:?set LIVEKIT_API_SECRET}
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:7880/"]
      interval: 5s
      timeout: 2s
      retries: 20
      start_period: 5s
    command:
      - --bind
      - 0.0.0.0

  yujian-rtc-b:
    image: livekit/livekit-server:v1.13.3@sha256:8ef3ee244ded8477d5b40d9dff4b084e1809a9fa0e4d9ed8d29943b3c6322998
    platform: linux/amd64
    environment:
      YUJIAN_RTC_NODE_ID: yujian-rtc-b
      LIVEKIT_CONFIG: |
        port: 7980
        rtc:
          tcp_port: 7981
          udp_port: 7982
          node_ip: ${YUJIAN_RTC_NODE_IP:?set YUJIAN_RTC_NODE_IP}
        redis:
          address: redis:6379
        keys:
          ${LIVEKIT_API_KEY:?set LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET:?set LIVEKIT_API_SECRET}
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:7980/"]
      interval: 5s
      timeout: 2s
      retries: 20
      start_period: 5s
    command:
      - --bind
      - 0.0.0.0
