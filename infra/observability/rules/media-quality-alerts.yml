groups:
  - name: yujian-media-quality
    rules:
      - alert: YujianSipAnswerRateLow
        expr: |
          sum(rate(yujian_sip_calls_total{answered="true"}[15m]))
          /
          clamp_min(sum(rate(yujian_sip_calls_total[15m])), 0.001) < 0.85
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: SIP answer rate is below 85 percent
      - alert: YujianSipP95PostDialDelayHigh
        expr: |
          histogram_quantile(0.95,
            sum by (le, provider) (rate(yujian_sip_post_dial_delay_ms_bucket[15m]))) > 8000
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: SIP P95 post dial delay exceeds 8 seconds
