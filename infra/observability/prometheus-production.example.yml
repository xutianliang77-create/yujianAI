global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    platform: yujian
    region: <region-id>
rule_files:
  - /etc/prometheus/rules/*.yml
scrape_configs:
  - job_name: yujian-platform-api
    metrics_path: /metrics
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
        regex: platform-api
        action: keep
      - source_labels: [__meta_kubernetes_pod_ip]
        target_label: __address__
        replacement: $1:8090
remote_write:
  - url: <private-prometheus-compatible-remote-write-url>
    authorization:
      credentials_file: /etc/prometheus/secrets/remote-write-token
    queue_config:
      capacity: 10000
      max_shards: 10
      min_shards: 1
      max_samples_per_send: 2000
