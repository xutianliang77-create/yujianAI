{{- if .Values.features.turnEnabled }}
{{- if not (regexMatch "@sha256:[0-9a-f]{64}$" .Values.image.turn) }}
{{ fail "turnEnabled requires image.turn pinned by sha256 digest" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "yujian-platform.fullname" . }}-turn
spec:
  replicas: {{ .Values.turn.replicas }}
  selector:
    matchLabels: { app.kubernetes.io/component: turn }
  template:
    metadata:
      labels: { app.kubernetes.io/component: turn }
    spec:
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        seccompProfile: { type: RuntimeDefault }
      {{ with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{ toYaml . | nindent 8 }}
      {{ end }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels: { app.kubernetes.io/component: turn }
      containers:
        - name: turn
          image: {{ .Values.image.turn | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["-c", "/etc/coturn/turnserver.conf"]
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
          ports:
            - { name: turn-udp, containerPort: 3478, protocol: UDP }
            - { name: turn-tcp, containerPort: 3478, protocol: TCP }
            - { name: turn-tls, containerPort: 5349, protocol: TCP }
          volumeMounts:
            - { name: config, mountPath: /etc/coturn/turnserver.conf, subPath: turnserver.conf, readOnly: true }
            - { name: tls, mountPath: /etc/coturn/tls, readOnly: true }
            - { name: tmp, mountPath: /tmp }
          readinessProbe:
            tcpSocket: { port: turn-tcp }
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            tcpSocket: { port: turn-tcp }
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{ toYaml .Values.resources.turn | nindent 12 }}
      volumes:
        - name: config
          secret:
            secretName: {{ .Values.turn.configSecret }}
            items:
              - { key: {{ .Values.turn.configKey }}, path: turnserver.conf }
        - name: tls
          secret: { secretName: {{ .Values.turn.tlsSecret }} }
        - name: tmp
          emptyDir: { sizeLimit: 64Mi }
{{- end }}
