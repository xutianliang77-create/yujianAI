{{ if .Values.features.rtcEnabled }}
{{ if and .Values.features.rtcCapacityEnabled (not (regexMatch "@sha256:[0-9a-f]{64}$" .Values.image.rtcCapacityExporter)) }}
{{ fail "rtcCapacityEnabled requires image.rtcCapacityExporter pinned by sha256 digest" }}
{{ end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "yujian-platform.fullname" . }}-rtc
spec:
  replicas: {{ .Values.replicaCount.rtc }}
  selector:
    matchLabels:
      app.kubernetes.io/component: rtc
  template:
    metadata:
      labels:
        app.kubernetes.io/component: rtc
    spec:
      terminationGracePeriodSeconds: 90
      securityContext:
        runAsNonRoot: true
        seccompProfile: { type: RuntimeDefault }
      {{ with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{ toYaml . | nindent 8 }}
      {{ end }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: rtc
      containers:
        - name: rtc
          image: {{ .Values.image.rtc | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
            readOnlyRootFilesystem: {{ .Values.security.readOnlyRootFilesystem }}
          env:
            - name: YUJIAN_RTC_NODE_ID
              valueFrom:
                fieldRef: { fieldPath: metadata.name }
            - name: LIVEKIT_CONFIG
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: {{ .Values.secrets.rtcConfig }}
          ports:
            - name: http
              containerPort: {{ .Values.service.rtcHttpPort }}
            - name: rtc-tcp
              containerPort: {{ .Values.service.rtcTcpPort }}
            - name: rtc-udp
              containerPort: {{ .Values.service.rtcUdpPort }}
              protocol: UDP
          resources:
            {{ toYaml .Values.resources.rtc | nindent 12 }}
          readinessProbe:
            httpGet: { path: /, port: http }
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet: { path: /, port: http }
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
        {{ if .Values.features.rtcCapacityEnabled }}
        - name: rtc-capacity-exporter
          image: {{ .Values.image.rtcCapacityExporter | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
            readOnlyRootFilesystem: true
          env:
            - name: YUJIAN_RTC_NODE_ID
              valueFrom:
                fieldRef: { fieldPath: metadata.name }
            - name: YUJIAN_RTC_LOCAL_URL
              value: "http://127.0.0.1:{{ .Values.service.rtcHttpPort }}"
            - name: YUJIAN_RTC_CAPACITY_PLATFORM_URL
              value: "http://{{ include "yujian-platform.fullname" . }}-platform-api:{{ .Values.service.platformApiPort }}"
            - name: YUJIAN_RTC_API_KEY
              valueFrom: { secretKeyRef: { name: {{ .Values.secrets.existingSecret }}, key: {{ .Values.secrets.rtcApiKey }} } }
            - name: YUJIAN_RTC_API_SECRET
              valueFrom: { secretKeyRef: { name: {{ .Values.secrets.existingSecret }}, key: {{ .Values.secrets.rtcApiSecret }} } }
            - name: YUJIAN_RTC_CAPACITY_CREDENTIAL
              valueFrom: { secretKeyRef: { name: {{ .Values.secrets.existingSecret }}, key: {{ .Values.secrets.rtcCapacityCredential }} } }
            - { name: YUJIAN_RTC_CAPACITY_INTERVAL_MS, value: {{ .Values.rtc.capacity.intervalMs | quote }} }
            - { name: YUJIAN_RTC_CAPACITY_TTL_MS, value: {{ .Values.rtc.capacity.ttlMs | quote }} }
            - { name: YUJIAN_RTC_MAX_ROOMS, value: {{ .Values.rtc.capacity.maxRooms | quote }} }
            - { name: YUJIAN_RTC_MAX_PARTICIPANTS, value: {{ .Values.rtc.capacity.maxParticipants | quote }} }
            - { name: YUJIAN_RTC_MAX_PUBLISHERS, value: {{ .Values.rtc.capacity.maxPublishers | quote }} }
            - { name: YUJIAN_RTC_MAX_SUBSCRIPTIONS, value: {{ .Values.rtc.capacity.maxSubscriptions | quote }} }
            - { name: YUJIAN_RTC_MAX_TRACKS, value: {{ .Values.rtc.capacity.maxTracks | quote }} }
          resources:
            {{ toYaml .Values.resources.rtcCapacityExporter | nindent 12 }}
        {{ end }}
{{ end }}
