{{ if .Values.features.rtcEnabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "yujian-platform.fullname" . }}-rtc
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: rtc
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector: {}
        - ipBlock: { cidr: 0.0.0.0/0 }
        - ipBlock: { cidr: "::/0" }
      ports:
        - protocol: TCP
          port: http
        - protocol: TCP
          port: rtc-tcp
        - protocol: UDP
          port: rtc-udp
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
{{ if eq .Values.dataServices.mode "embedded-single" }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: redis
      ports:
        - protocol: TCP
          port: redis
{{ else }}
    - to:
{{ range .Values.dataServices.externalEgressCidrs }}
        - ipBlock: { cidr: {{ . | quote }} }
{{ end }}
      ports:
        - { protocol: TCP, port: {{ .Values.dataServices.redisPort }} }
{{ end }}
{{ if .Values.features.rtcCapacityEnabled }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: platform-api
      ports:
        - { protocol: TCP, port: http }
{{ end }}
{{ end }}

{{ if .Values.features.turnEnabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "yujian-platform.fullname" . }}-turn
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: turn
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - ipBlock: { cidr: 0.0.0.0/0 }
        - ipBlock: { cidr: "::/0" }
      ports:
        - { protocol: UDP, port: 3478 }
        - { protocol: TCP, port: 3478 }
        - { protocol: TCP, port: 5349 }
{{- range $port := untilStep (int .Values.turn.relayPortMin) (add1 (int .Values.turn.relayPortMax) | int) 1 }}
        - { protocol: UDP, port: {{ $port }} }
{{- end }}
  egress:
    - to:
        - ipBlock: { cidr: 0.0.0.0/0 }
        - ipBlock: { cidr: "::/0" }
{{ end }}

