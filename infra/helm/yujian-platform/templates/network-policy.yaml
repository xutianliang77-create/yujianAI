apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "yujian-platform.fullname" . }}-platform-api
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: platform-api
  policyTypes: [Ingress, Egress]
  ingress:
{{ if .Values.gateway.enabled }}
    - from:
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.gateway.controllerNamespaceSelector | nindent 14 }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.gateway.controllerPodSelector | nindent 14 }}
      ports:
        - protocol: TCP
          port: http
{{ else }}
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: http
{{ end }}
{{ if .Values.features.rtcCapacityEnabled }}
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: rtc
      ports:
        - protocol: TCP
          port: http
{{ end }}
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
{{ if eq .Values.dataServices.mode "embedded-single" }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: postgres
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: redis
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
{{ else }}
    - to:
{{ range .Values.dataServices.externalEgressCidrs }}
        - ipBlock: { cidr: {{ . | quote }} }
{{ end }}
      ports:
        - { protocol: TCP, port: {{ .Values.dataServices.postgresPort }} }
        - { protocol: TCP, port: {{ .Values.dataServices.redisPort }} }
{{ end }}
    - to:
{{ range .Values.platformRuntime.kmsEgressCidrs }}
        - ipBlock: { cidr: {{ . | quote }} }
{{ end }}
      ports:
        - { protocol: TCP, port: {{ .Values.platformRuntime.kmsPort }} }
{{ if gt (len .Values.platformRuntime.externalHttpsEgressCidrs) 0 }}
    - to:
{{ range .Values.platformRuntime.externalHttpsEgressCidrs }}
        - ipBlock: { cidr: {{ . | quote }} }
{{ end }}
      ports:
        - { protocol: TCP, port: 443 }
{{ end }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: rtc
      ports:
        - protocol: TCP
          port: http
        - protocol: TCP
          port: rtc-tcp
        - protocol: UDP
          port: rtc-udp
{{ if .Values.features.mediaOpsEnabled }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: media-ops
      ports:
        - protocol: TCP
          port: https
{{ end }}

