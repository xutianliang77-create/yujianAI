apiVersion: v1
kind: ServiceAccount
metadata:
  name: yujian-deployment-operator
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: yujian-deployment-executor
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: yujian-deployment-operator
rules:
  - apiGroups: [platform.yujian.ai]
    resources: [yujianplatforms]
    verbs: [get, list, watch]
  - apiGroups: [platform.yujian.ai]
    resources: [yujianplatforms/status]
    verbs: [get, update, patch]
  - apiGroups: [batch]
    resources: [jobs]
    verbs: [get, list, create]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: yujian-deployment-operator
subjects:
  - { kind: ServiceAccount, name: yujian-deployment-operator }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: yujian-deployment-operator }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: yujian-deployment-executor
rules:
  - apiGroups: [""]
    resources: [configmaps, services, serviceaccounts]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get]
  - apiGroups: [apps]
    resources: [deployments, statefulsets]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [batch]
    resources: [jobs]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [networking.k8s.io]
    resources: [ingresses, networkpolicies]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [policy]
    resources: [poddisruptionbudgets]
    verbs: [get, list, watch, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: yujian-deployment-executor
subjects:
  - { kind: ServiceAccount, name: yujian-deployment-executor }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: yujian-deployment-executor }
