apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: yujianplatforms.platform.yujian.ai
spec:
  group: platform.yujian.ai
  scope: Namespaced
  names:
    plural: yujianplatforms
    singular: yujianplatform
    kind: YujianPlatform
    shortNames: [yjp]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources: { status: {} }
      additionalPrinterColumns:
        - { name: Phase, type: string, jsonPath: .status.phase }
        - { name: Chart, type: string, jsonPath: .spec.chartVersion }
        - { name: Age, type: date, jsonPath: .metadata.creationTimestamp }
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [releaseName, chartRef, chartVersion, chartDigest, valuesSecretRef, targetSchemaVersion, executorImage]
              properties:
                releaseName: { type: string, pattern: '^[a-z0-9](?:[-a-z0-9]{0,61}[a-z0-9])?$' }
                chartRef: { type: string, pattern: '^oci://[a-z0-9.-]+(?::[0-9]{1,5})?/[a-z0-9._/-]+$' }
                chartVersion: { type: string, pattern: '^[0-9]+\.[0-9]+\.[0-9]+(?:[-+][0-9A-Za-z.-]+)?$' }
                chartDigest: { type: string, pattern: '^sha256:[0-9a-f]{64}$' }
                valuesSecretRef: { type: string, pattern: '^[a-z0-9](?:[-a-z0-9]{0,61}[a-z0-9])?$' }
                targetSchemaVersion: { type: integer, minimum: 1, maximum: 999 }
                currentSchemaVersion: { type: integer, minimum: 0, maximum: 999 }
                previousImageDigest: { type: string, pattern: '^sha256:[0-9a-f]{64}$' }
                executorImage: { type: string, pattern: '^.+@sha256:[0-9a-f]{64}$' }
                timeoutSeconds: { type: integer, minimum: 60, maximum: 3600, default: 900 }
                rollbackToRevision: { type: integer, minimum: 1 }
                approvalReceiptRef: { type: string, pattern: '^(evidence|https|s3|oss)://[^\s?#]+$' }
                suspended: { type: boolean, default: false }
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
