apiVersion: apps/v1
kind: Deployment
metadata:
  name: yujian-deployment-operator
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: yujian-deployment-operator }
  template:
    metadata:
      labels: { app.kubernetes.io/name: yujian-deployment-operator }
    spec:
      serviceAccountName: yujian-deployment-operator
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: operator
          image: ghcr.io/xutianliang77-create/yujian-deployment-operator@sha256:<digest>
          imagePullPolicy: IfNotPresent
          env:
            - name: POD_NAMESPACE
              valueFrom: { fieldRef: { fieldPath: metadata.namespace } }
            - { name: NODE_EXTRA_CA_CERTS, value: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
            readOnlyRootFilesystem: true
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 500m, memory: 256Mi }
